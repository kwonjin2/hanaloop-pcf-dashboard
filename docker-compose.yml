services:
  postgres:
    image: postgres:16-alpine
    container_name: hanaloop_pcf_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pcf
      POSTGRES_PASSWORD: pcf_local
      POSTGRES_DB: hanaloop_pcf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcf -d hanaloop_pcf"]
      interval: 5s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: 
